<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时对话网站</title>
    <!-- 引入Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        
        header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
        }
        
        .message {
            padding: 12px 18px;
            margin-bottom: 15px;
            border-radius: 18px;
            max-width: 80%;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .message.user {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .message.other {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            background-color: #f0f2f5;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        #messageInput:focus {
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        
        #sendButton {
            padding: 15px 25px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(79, 172, 254, 0.4);
        }
        
        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 172, 254, 0.6);
        }
        
        #sendButton:active {
            transform: translateY(0);
        }
        
        .info {
            text-align: center;
            padding: 10px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            opacity: 0.5;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 滚动条样式 */
        .messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        
        .messages::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                height: 90vh;
                border-radius: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>实时对话</h1>
            <p class="subtitle">与所有访问者分享您的想法</p>
        </header>
        
        <div class="chat-container">
            <div class="messages" id="messagesContainer">
                <div class="empty-state">
                    <i>💬</i>
                    <p>还没有消息，成为第一个发言的人吧！</p>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入您的消息...">
                <button id="sendButton">发送</button>
            </div>
            
            <div class="info">
                所有消息将在24小时后自动清除
            </div>
        </div>
    </div>

    <script>
        // Firebase配置 - 你需要替换为你的项目配置
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 初始化Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 获取DOM元素
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // 生成随机用户名
        const adjectives = ["快乐的", "聪明的", "勇敢的", "好奇的", "友善的", "活泼的", "安静的", "热情的"];
        const nouns = ["熊猫", "老虎", "狐狸", "兔子", "猫咪", "狗狗", "海豚", "老鹰"];
        const randomName = adjectives[Math.floor(Math.random() * adjectives.length)] + nouns[Math.floor(Math.random() * nouns.length)];
        
        // 生成用户ID（简化实现）
        const userId = Math.random().toString(36).substring(2, 15);

        // 监听消息发送
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 发送消息函数
        function sendMessage() {
            const messageText = messageInput.value.trim();
            
            if (messageText) {
                // 添加消息到Firestore
                db.collection('messages').add({
                    text: messageText,
                    user: randomName,
                    userId: userId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => {
                    // 清空输入框
                    messageInput.value = '';
                })
                .catch((error) => {
                    console.error("发送消息出错: ", error);
                    alert("消息发送失败，请稍后重试");
                });
            }
        }

        // 监听并显示消息
        db.collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot((snapshot) => {
                // 清除空状态提示
                const emptyState = messagesContainer.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }
                
                // 清空消息容器（简化实现，实际应用中应使用更高效的方法）
                messagesContainer.innerHTML = '';
                
                // 获取24小时前的时间戳
                const oneDayAgo = new Date();
                oneDayAgo.setDate(oneDayAgo.getDate() - 1);
                
                snapshot.forEach((doc) => {
                    const message = doc.data();
                    const messageTime = message.timestamp ? message.timestamp.toDate() : new Date();
                    
                    // 只显示一天内的消息
                    if (messageTime > oneDayAgo) {
                        const messageElement = document.createElement('div');
                        messageElement.className = `message ${message.userId === userId ? 'user' : 'other'}`;
                        
                        const timeString = messageTime.toLocaleTimeString('zh-CN', { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                        
                        messageElement.innerHTML = `
                            <div class="message-header">
                                <span>${message.user}</span>
                                <span>${timeString}</span>
                            </div>
                            <div class="message-text">${message.text}</div>
                        `;
                        
                        messagesContainer.appendChild(messageElement);
                    }
                });
                
                // 滚动到底部
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });

        // 定期清理超过24小时的消息（简化实现，实际应在服务器端实现）
        setInterval(() => {
            const oneDayAgo = new Date();
            oneDayAgo.setDate(oneDayAgo.getDate() - 1);
            
            db.collection('messages')
                .where('timestamp', '<', oneDayAgo)
                .get()
                .then((snapshot) => {
                    snapshot.forEach((doc) => {
                        doc.ref.delete();
                    });
                });
        }, 60 * 60 * 1000); // 每小时执行一次
    </script>
</body>
</html>
